<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browsers Genealogy Map</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100dvh;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 15%, #1e293b, #0f172a 42%, #020617 100%);
            color: #f8fafc;
            overflow: hidden;
            position: relative;
        }
        #cy {
            flex-grow: 1;
            height: 100%;
            min-width: 0;
        }
        #sidebar {
            width: 460px;
            min-width: 460px;
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.96), rgba(15, 23, 42, 0.95));
            padding: 32px 28px;
            box-shadow: -12px 0 32px rgba(2, 6, 23, 0.55);
            overflow-y: auto;
            display: none;
            flex-direction: column;
            border-left: 1px solid #334155;
            opacity: 0;
            transform: translateX(18px);
            position: absolute;
            top: 0;
            right: 0;
            height: 100%;
            z-index: 15;
        }
        #sidebar.sidebar-open {
            animation: sidebarIn 0.28s ease-out forwards;
        }
        #sidebar.sidebar-closing {
            animation: sidebarOut 0.22s ease-in forwards;
        }
        @keyframes sidebarIn {
            from {
                transform: translateX(24px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @keyframes sidebarOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(24px);
                opacity: 0;
            }
        }
        body.dark-mode,
        body.theme-dark-standard {
            background: #0f172a;
            color: #f8fafc;
        }
        body.dark-mode #sidebar,
        body.theme-dark-standard #sidebar {
            background: #1e293b;
            border-left-color: #334155;
        }
        body.dark-mode #sidebar-header,
        body.theme-dark-standard #sidebar-header {
            border-bottom-color: #334155;
        }
        body.dark-mode #content,
        body.theme-dark-standard #content {
            color: #cbd5e1;
        }
        body.theme-dark-oled {
            background: #000000;
            color: #f8fafc;
        }
        body.theme-dark-oled #sidebar {
            background: #0b0b0b;
            border-left-color: #1f2937;
        }
        body.theme-dark-oled #sidebar-header {
            border-bottom-color: #1f2937;
        }
        body.theme-dark-oled #content {
            color: #d1d5db;
        }
        body.theme-dark-oled #legend {
            background: rgba(12, 12, 12, 0.92);
            border-color: #1f2937;
            color: #9ca3af;
        }
        body.light-mode,
        body.theme-light {
            background: radial-gradient(circle at 20% 12%, #dbeafe, #f8fafc 42%, #e2e8f0 100%);
            color: #0f172a;
        }
        body.light-mode #sidebar,
        body.theme-light #sidebar {
            background: #f1f5f9;
            border-left-color: #cbd5e1;
        }
        body.light-mode #sidebar-header,
        body.theme-light #sidebar-header {
            border-bottom-color: #cbd5e1;
        }
        body.light-mode #content,
        body.theme-light #content {
            color: #334155;
        }
        body.light-mode #title,
        body.theme-light #title {
            color: #0369a1;
        }
        body.light-mode #close-btn,
        body.theme-light #close-btn {
            color: #475569;
        }
        body.light-mode #close-btn:hover,
        body.theme-light #close-btn:hover {
            color: #0f172a;
            background: #cbd5e1;
        }
        body.light-mode #sidebar-logo-wrap,
        body.theme-light #sidebar-logo-wrap {
            background: #e2e8f0;
        }
        body.light-mode #content hr,
        body.theme-light #content hr {
            border-top-color: #cbd5e1;
        }
        body.light-mode #sidebar a,
        body.theme-light #sidebar a {
            color: #0369a1;
        }
        body.light-mode #cy,
        body.theme-light #cy {
            background: #f8fafc;
        }
        body.light-mode #legend,
        body.theme-light #legend {
            background: rgba(241, 245, 249, 0.95);
            border-color: #cbd5e1;
            color: #334155;
        }
        body.light-mode #placeholder,
        body.theme-light #placeholder {
            color: #64748b;
        }
        body.light-mode #placeholder span,
        body.theme-light #placeholder span {
            color: #94a3b8 !important;
        }
        body.light-mode .btn-add,
        body.theme-light .btn-add {
            background: #0ea5e9;
            color: #ffffff;
        }
        body.light-mode .btn-add:hover,
        body.theme-light .btn-add:hover {
            background: #0284c7;
        }
        #theme-select {
            padding: 8px 12px;
            background: rgba(15, 23, 42, 0.72);
            color: #f8fafc;
            border: 1px solid #334155;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
            min-width: 160px;
            transition: background 0.3s, border-color 0.3s;
        }
        #theme-select:hover {
            background: #475569;
        }
        body.light-mode #theme-select,
        body.theme-light #theme-select {
            background: #e2e8f0;
            color: #0f172a;
            border: 1px solid #cbd5e1;
        }
        body.light-mode #theme-select:hover,
        body.theme-light #theme-select:hover {
            background: #cbd5e1;
        }
        #sidebar-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 18px;
            border-bottom: 1px solid #334155;
            gap: 16px;
        }
        #sidebar-logo-wrap {
            width: 52px;
            height: 52px;
            flex-shrink: 0;
            border-radius: 10px;
            overflow: hidden;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #sidebar-logo-wrap img {
            width: 44px;
            height: 44px;
            object-fit: contain;
        }
        #sidebar-title-block { flex: 1; min-width: 0; }
        #title {
            color: #38bdf8;
            margin: 0 0 4px;
            font-size: 1.4em;
            line-height: 1.2;
        }
        #engine-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.72em;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        #close-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: #64748b;
            font-size: 1.4em;
            cursor: pointer;
            line-height: 1;
            padding: 4px 6px;
            border-radius: 6px;
            transition: color 0.2s, background 0.2s;
            flex-shrink: 0;
        }
        #close-btn:hover { color: #f8fafc; background: #334155; }
        #content {
            font-size: 0.95em;
            line-height: 1.75;
            color: #cbd5e1;
        }
        #content p { margin: 0 0 14px; }
        #content hr { border: 0; border-top: 1px solid #334155; margin: 18px 0; }
        #sidebar a { color: #38bdf8; text-decoration: none; font-weight: bold; }
        #sidebar a:hover { text-decoration: underline; }
        #no-wiki-notice {
            background: #1e3a5f;
            border: 1px solid #2563eb44;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85em;
            color: #93c5fd;
            margin-bottom: 14px;
            display: none;
        }
        .btn-add {
            position: absolute;
            bottom: 20px;
            left: 20px;
            padding: 12px 24px;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            transition: background 0.3s;
            z-index: 10;
        }
        .btn-add:hover { background: #7dd3fc; }
        #watermark {
            position: fixed;
            bottom: 12px;
            right: 16px;
            font-size: 0.7em;
            color: rgba(148, 163, 184, 0.4);
            pointer-events: none;
            z-index: 5;
            letter-spacing: 0.025em;
            user-select: none;
        }
        body.theme-light #watermark,
        body.light-mode #watermark {
            color: rgba(71, 85, 105, 0.45);
        }
        body.mobile-layout #watermark {
            bottom: calc(env(safe-area-inset-bottom, 0px) + 54px);
            right: 50%;
            transform: translateX(50%);
            font-size: 0.68em;
        }
        #placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #475569;
            pointer-events: none;
            font-size: 1.1em;
            text-align: center;
            line-height: 2;
        }
        #legend {
            position: absolute;
            top: 16px;
            left: 16px;
            background: linear-gradient(160deg, rgba(30, 41, 59, 0.92), rgba(15, 23, 42, 0.9));
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.76em;
            color: #94a3b8;
            z-index: 10;
            pointer-events: auto;
            backdrop-filter: blur(4px);
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 250px;
            max-width: 290px;
            box-shadow: 0 12px 28px rgba(2, 6, 23, 0.38);
        }
        #legend-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 4px;
        }
        #legend-title {
            font-size: 0.78rem;
            font-weight: 700;
            color: inherit;
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
            width: 100%;
            padding: 6px 8px;
            border: 1px solid transparent;
            border-radius: 8px;
            background: transparent;
            color: inherit;
            cursor: pointer;
            text-align: left;
            transition: background 0.2s, border-color 0.2s, color 0.2s;
        }
        .legend-item:hover {
            background: rgba(148, 163, 184, 0.12);
            border-color: rgba(148, 163, 184, 0.22);
        }
        .legend-item.active {
            background: rgba(56, 189, 248, 0.16);
            border-color: rgba(56, 189, 248, 0.3);
            color: #f8fafc;
        }
        body.theme-light .legend-item.active,
        body.light-mode .legend-item.active {
            color: #0f172a;
            background: rgba(14, 165, 233, 0.14);
            border-color: rgba(14, 165, 233, 0.28);
        }
        .legend-dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        body.theme-dark-standard .btn-add,
        body.dark-mode .btn-add {
            background: #38bdf8;
            color: #082f49;
        }
        body.theme-dark-standard .btn-add:hover,
        body.dark-mode .btn-add:hover {
            background: #7dd3fc;
        }
        body.theme-dark-oled .btn-add {
            background: #22d3ee;
            color: #042f2e;
        }
        body.theme-dark-oled .btn-add:hover {
            background: #67e8f9;
        }
        body.mobile-layout #legend {
            top: calc(env(safe-area-inset-top, 0px) + 8px);
            left: 12px;
            right: 12px;
            max-width: none;
            min-width: 0;
            font-size: 0.73em;
            overflow: hidden;
            z-index: 20;
            transition: max-height 0.25s ease;
        }
        body.mobile-layout #legend:not(.collapsed) {
            max-height: 36dvh;
            overflow-y: auto;
        }
        body.mobile-layout #legend.collapsed {
            max-height: 54px;
        }
        body.mobile-layout #legend.collapsed .legend-item {
            display: none;
        }
        body.mobile-layout #legend-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 1em;
            padding: 0 4px;
            line-height: 1;
            opacity: 0.7;
            transition: transform 0.2s;
        }
        body.mobile-layout #legend.collapsed #legend-toggle { transform: rotate(-90deg); }
        #legend-toggle { display: none; }
        body.mobile-layout #legend-header {
            flex-direction: row;
            align-items: center;
        }
        body.mobile-layout #theme-select {
            flex: 1;
            min-width: 0;
        }
        body.mobile-layout #sidebar {
            width: 100%;
            min-width: 0;
            padding: 24px 20px;
        }
        body.mobile-layout #sidebar-logo-wrap {
            width: 46px;
            height: 46px;
        }
        body.mobile-layout #sidebar-logo-wrap img {
            width: 38px;
            height: 38px;
        }
        body.mobile-layout #title {
            font-size: 1.2em;
        }
        body.mobile-layout #content {
            font-size: 0.9em;
        }
        body.mobile-layout .btn-add {
            left: 12px;
            right: 12px;
            width: auto;
            bottom: calc(env(safe-area-inset-bottom, 0px) + 10px);
            z-index: 22;
        }
        body.mobile-layout.sidebar-visible .btn-add {
            display: none;
        }
        body.mobile-layout #placeholder {
            width: calc(100% - 24px);
            top: 56%;
            font-size: 1em;
            line-height: 1.6;
        }
        @media (max-width: 520px) and (max-height: 760px) {
            body.mobile-layout #legend {
                padding: 8px 12px;
            }
            body.mobile-layout #placeholder {
                top: 60%;
                font-size: 0.95em;
            }
            body.mobile-layout #content {
                line-height: 1.55;
            }
        }
    </style>
</head>
<body>

    <div id="placeholder">Click on a browser node to see details<br><span style="font-size:0.85em;color:#334155">Scroll to zoom · Drag to pan</span></div>
    <div id="cy"></div>

    <div id="legend">
        <div id="legend-header">
            <span id="legend-title">Families</span>
            <select id="theme-select" onchange="changeTheme(this.value)">
                <option value="dark-standard">Dark (Standard)</option>
                <option value="dark-oled">Dark (OLED)</option>
                <option value="light">Light</option>
            </select>
            <button id="legend-toggle" title="Toggle legend" onclick="toggleMobileLegend()">&#9660;</button>
        </div>
        <button class="legend-item" data-group="blink"><span class="legend-dot" style="background:#38bdf8"></span>Blink-based</button>
        <button class="legend-item" data-group="gecko"><span class="legend-dot" style="background:#a78bfa"></span>Gecko-based</button>
        <button class="legend-item" data-group="webkit"><span class="legend-dot" style="background:#34d399"></span>WebKit-based</button>
        <button class="legend-item" data-group="presto"><span class="legend-dot" style="background:#ef4444"></span>Presto-based</button>
        <button class="legend-item" data-group="mosaic"><span class="legend-dot" style="background:#d97706"></span>Mosaic lineage</button>
        <button class="legend-item" data-group="independent"><span class="legend-dot" style="background:#f59e0b"></span>Independent engine</button>
        <button class="legend-item" data-group="legacy"><span class="legend-dot" style="background:#94a3b8"></span>Engine / Legacy</button>
    </div>

    <div id="sidebar">
        <div id="sidebar-header">
            <div id="sidebar-logo-wrap">
                <img id="sidebar-logo" src="" alt="" onerror="this.style.display='none'">
            </div>
            <div id="sidebar-title-block">
                <h2 id="title">Browser</h2>
                <span id="engine-badge"></span>
            </div>
            <button id="close-btn" onclick="closeSidebar()">✕</button>
        </div>
        <div id="no-wiki-notice"></div>
        <div id="content">Loading information...</div>
    </div>

    <button class="btn-add" onclick="window.open('https://github.com/Marmarek-here/Browsers-Map/issues')">
        Suggest a Browser
    </button>
    <div id="watermark">Browsers tree by Marmarek</div>

    <script>
        // --- Config ---
        const nodeColors = {
            chromium: '#38bdf8', chrome: '#38bdf8', brave: '#38bdf8',
            edge: '#38bdf8', opera: '#38bdf8', vivaldi: '#38bdf8',
            ungoogled: '#38bdf8', bromite: '#38bdf8', cromite: '#38bdf8', arc: '#38bdf8', kiwi: '#38bdf8', min: '#38bdf8', samsung: '#38bdf8', blink: '#38bdf8',
            gecko: '#a78bfa', firefox: '#a78bfa', tor: '#a78bfa',
            librewolf: '#a78bfa', mullvad: '#a78bfa', palemoon: '#a78bfa', zen: '#a78bfa', icecat: '#a78bfa', waterfox: '#a78bfa',
            presto: '#ef4444', 'opera-presto': '#ef4444',
            netscape: '#d97706', mosaic: '#d97706',
            webkit: '#34d399', safari: '#34d399', konqueror: '#34d399', khtml: '#34d399',
            ladybird: '#f59e0b', netsurf: '#f59e0b', flow: '#f59e0b', dillo: '#f59e0b',
            ie: '#94a3b8', trident: '#94a3b8', edgehtml: '#94a3b8', 'edge-legacy': '#94a3b8', 'windows-webbrowser': '#94a3b8', 'windows-webview2': '#38bdf8',
        };

        const engineLabels = {
            chromium: 'Blink', chrome: 'Blink', brave: 'Blink',
            edge: 'Blink', opera: 'Blink', vivaldi: 'Blink',
            ungoogled: 'Blink', bromite: 'Blink', cromite: 'Blink', arc: 'Blink', kiwi: 'Blink', min: 'Blink', samsung: 'Blink', blink: 'Blink engine',
            gecko: 'Gecko engine', firefox: 'Gecko', tor: 'Gecko',
            librewolf: 'Gecko', mullvad: 'Gecko', palemoon: 'Goanna', zen: 'Gecko', icecat: 'Gecko', waterfox: 'Gecko',
            netscape: 'Mosaic lineage',
            webkit: 'WebKit engine', safari: 'WebKit', konqueror: 'KHTML', khtml: 'KHTML engine',
            presto: 'Presto engine', 'opera-presto': 'Presto', ladybird: 'LibWeb', netsurf: 'NetSurf', flow: 'Flow', dillo: 'Dillo',
            mosaic: 'NCSA Mosaic', ie: 'Trident', trident: 'Trident engine', edgehtml: 'EdgeHTML engine', 'edge-legacy': 'EdgeHTML',
        };

        const engineColors = {
            'Blink': { bg: '#1e3a5f', text: '#38bdf8' },
            'Blink engine': { bg: '#1e3a5f', text: '#38bdf8' },
            'Gecko': { bg: '#2e1b5e', text: '#a78bfa' },
            'Goanna': { bg: '#2e1b5e', text: '#c4b5fd' },
            'Gecko engine': { bg: '#2e1b5e', text: '#a78bfa' },
            'Gecko/Trident': { bg: '#2e1b5e', text: '#a78bfa' },
            'WebKit': { bg: '#0f2e23', text: '#34d399' },
            'WebKit engine': { bg: '#0f2e23', text: '#34d399' },
            'Presto': { bg: '#3a1114', text: '#f87171' },
            'Presto engine': { bg: '#3a1114', text: '#f87171' },
            'Mosaic lineage': { bg: '#3b2308', text: '#f59e0b' },
            'LibWeb': { bg: '#2a1f07', text: '#f59e0b' },
            'NetSurf': { bg: '#2a1f07', text: '#f59e0b' },
            'Flow': { bg: '#2a1f07', text: '#f59e0b' },
            'Dillo': { bg: '#2a1f07', text: '#f59e0b' },
            'NCSA Mosaic': { bg: '#3b2308', text: '#f59e0b' },
            'Trident': { bg: '#1e293b', text: '#94a3b8' },
        };

        let activeLegendGroup = null;

        function detectOs() {
            const ua = navigator.userAgent;
            if (/Android/i.test(ua)) return 'android';
            if (/iPhone|iPad|iPod/i.test(ua)) return 'ios';
            if (/Windows/i.test(ua)) return 'windows';
            if (/Mac OS X|Macintosh/i.test(ua)) return 'macos';
            return 'linux';
        }

        function getViewportProfile() {
            const mobileOs = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);
            return mobileOs || window.innerWidth < 920 ? 'mobile' : 'desktop';
        }

        function applyViewportProfile() {
            const profile = getViewportProfile();
            document.body.classList.toggle('mobile-layout', profile === 'mobile');
            document.body.classList.toggle('desktop-layout', profile === 'desktop');
            document.body.dataset.os = detectOs();
            return profile;
        }

        function getLayoutOptions(profile) {
            if (profile === 'mobile') {
                return {
                    name: 'breadthfirst',
                    directed: true,
                    padding: 38,
                    spacingFactor: 0.94,
                    avoidOverlap: true,
                };
            }

            return {
                name: 'breadthfirst',
                directed: true,
                padding: 56,
                spacingFactor: 0.8,
                avoidOverlap: true,
            };
        }

        function getLegendGroup(nodeId) {
            if (['chromium', 'chrome', 'brave', 'edge', 'opera', 'vivaldi', 'arc', 'kiwi', 'min', 'samsung', 'ungoogled', 'bromite', 'cromite', 'android-webview', 'blink', 'windows-webview2'].includes(nodeId)) return 'blink';
            if (['firefox', 'tor', 'librewolf', 'mullvad', 'palemoon', 'zen', 'icecat', 'waterfox', 'gecko'].includes(nodeId)) return 'gecko';
            if (['webkit', 'safari', 'konqueror', 'khtml', 'ios-wkwebview', 'macos-webview'].includes(nodeId)) return 'webkit';
            if (['presto', 'opera-presto'].includes(nodeId)) return 'presto';
            if (['mosaic', 'netscape'].includes(nodeId)) return 'mosaic';
            if (['ie', 'trident', 'edgehtml', 'edge-legacy', 'windows-webbrowser'].includes(nodeId)) return 'legacy';
            return 'independent';
        }

        function adjustSpecialPositions(cy, profile) {
            const edgeNode = cy.getElementById('edge');
            const webviewNode = cy.getElementById('windows-webview2');

            if (!edgeNode.length || !webviewNode.length) return;

            const edgePos = edgeNode.position();
            const xOffset = profile === 'mobile' ? 46 : 112;
            const yOffset = profile === 'mobile' ? 38 : 72;
            webviewNode.position({ x: edgePos.x + xOffset, y: edgePos.y + yOffset });
        }

        function setLegendActive(group) {
            document.querySelectorAll('.legend-item').forEach((item) => {
                item.classList.toggle('active', item.dataset.group === group);
            });
        }

        let cyRef = null;

        function toggleMobileLegend() {
            document.getElementById('legend').classList.toggle('collapsed');
        }

        if (getViewportProfile() === 'mobile') {
            document.getElementById('legend').classList.add('collapsed');
        }



        function getGoogleFaviconUrl(rawUrl, size = 256) {
            try {
                const origin = new URL(rawUrl).origin;
                return `https://t2.gstatic.com/faviconV2?client=SOCIAL&type=FAVICON&fallback_opts=TYPE,SIZE,URL&url=${encodeURIComponent(origin)}&size=${size}`;
            } catch (e) {
                return `https://www.google.com/s2/favicons?sz=${size}&domain_url=${rawUrl}`;
            }
        }

        // Force all icons through Google's favicon APIs for consistency.
        function getLogoUrl(nodeData, size = 256) {
            return getGoogleFaviconUrl(nodeData.url, size);
        }

        function getAutoNodeMeta(nodeData) {
            const metaById = {
                chrome: { currentVersion: '146.0.7680.180', eol: 'Active' },
                chromium: { currentVersion: 'Unknown', eol: 'Active' },
                firefox: { currentVersion: '149.0.2', eol: 'Active' },
                edge: { currentVersion: '146.0.3856.109', eol: 'Active' },
                safari: { currentVersion: '26.0', eol: 'Active' },
                opera: { currentVersion: '130.0.5847.12', eol: 'Active' },
                brave: { currentVersion: 'Stable channel (rolling)', eol: 'Active' },
                vivaldi: { currentVersion: '7.9.3970.45', eol: 'Active' },
                arc: { currentVersion: 'Stable channel (rolling)', eol: 'Active' },
                tor: { currentVersion: 'Stable channel (rolling)', eol: 'Active' },
                librewolf: { currentVersion: 'Stable channel (rolling)', eol: 'Active' },
                mullvad: { currentVersion: 'Stable channel (rolling)', eol: 'Active' },
                waterfox: { currentVersion: 'Stable channel (rolling)', eol: 'Active' },
                zen: { currentVersion: 'Stable channel (rolling)', eol: 'Active' },
                samsung: { currentVersion: 'Stable channel (rolling)', eol: 'Active' },
                'android-webview': { currentVersion: 'Tracks Chromium stable', eol: 'Active' },
                'ios-wkwebview': { currentVersion: 'Tracks iOS release', eol: 'Active' },
                'windows-webview2': { currentVersion: 'Evergreen runtime', eol: 'Active' },
                'edge-legacy': { currentVersion: '44 (final)', eol: 'EoL (2021)' },
                ie: { currentVersion: '11 (final)', eol: 'EoL (2022)' },
                trident: { currentVersion: 'Engine only', eol: 'EoL' },
                edgehtml: { currentVersion: 'Engine only', eol: 'EoL' },
                presto: { currentVersion: 'Engine only', eol: 'EoL' },
                'opera-presto': { currentVersion: '12.18 (final)', eol: 'EoL' },
                mosaic: { currentVersion: 'Discontinued', eol: 'EoL' },
                netscape: { currentVersion: 'Discontinued', eol: 'EoL' },
                'windows-webbrowser': { currentVersion: 'Legacy control', eol: 'Legacy / deprecated' },
                bromite: { currentVersion: 'Project status varies', eol: 'Likely inactive' },
                cromite: { currentVersion: 'Stable channel (rolling)', eol: 'Active' },
                ungoogled: { currentVersion: 'Tracks Chromium releases', eol: 'Active community project' }
            };

            const hardcoded = metaById[nodeData.id];
            if (hardcoded) return hardcoded;

            const label = (nodeData.label || '').toLowerCase();
            if (label.includes('engine')) {
                return { currentVersion: 'Engine component', eol: 'Varies by embedding app' };
            }

            return { currentVersion: 'Unknown', eol: 'Unknown' };
        }

        function renderVersionSource(versionSource) {
            if (!versionSource) return '';
            if (/^https?:\/\//i.test(versionSource)) {
                try {
                    const host = new URL(versionSource).host;
                    return `<p><strong>Version source:</strong> <a href="${versionSource}" target="_blank">${host}</a></p>`;
                } catch (e) {
                    return `<p><strong>Version source:</strong> ${versionSource}</p>`;
                }
            }
            return `<p><strong>Version source:</strong> ${versionSource}</p>`;
        }

        function buildMetaHtml(nodeData) {
            const parts = [];
            if (nodeData.author) {
                parts.push(`<p><strong>Author:</strong> ${nodeData.author}</p>`);
            }
            if (nodeData.currentVersion) {
                parts.push(`<p><strong>Current version:</strong> ${nodeData.currentVersion}</p>`);
            }
            if (nodeData.eol) {
                parts.push(`<p><strong>EoL:</strong> ${nodeData.eol}</p>`);
            }
            if (nodeData.versionSource) {
                parts.push(renderVersionSource(nodeData.versionSource));
            }
            return parts.length ? `<hr>${parts.join('')}` : '';
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (sidebar.style.display === 'none') return;
            sidebar.classList.remove('sidebar-open');
            sidebar.classList.add('sidebar-closing');
            document.body.classList.remove('sidebar-visible');
            setTimeout(() => {
                sidebar.style.display = 'none';
                sidebar.classList.remove('sidebar-closing');
            }, 220);
            const hintDismissed = localStorage.getItem('mapHintDismissed') === '1';
            document.getElementById('placeholder').style.display = hintDismissed ? 'none' : 'block';
        }

        async function init() {
            try {
                const response = await fetch('data.json');
                const data = await response.json();
                const hintDismissed = localStorage.getItem('mapHintDismissed') === '1';
                document.getElementById('placeholder').style.display = hintDismissed ? 'none' : 'block';
                const profile = applyViewportProfile();

                // Auto-fill metadata for every node to keep fields complete.
                data.nodes.forEach((entry) => {
                    const d = entry.data;
                    const autoMeta = getAutoNodeMeta(d);
                    if (!d.currentVersion || ['Stable channel (rolling)', 'Bundled with latest macOS/iOS'].includes(d.currentVersion)) {
                        d.currentVersion = autoMeta.currentVersion;
                    }
                    if (!d.eol) d.eol = autoMeta.eol;
                });

                const cy = cytoscape({
                    container: document.getElementById('cy'),
                    elements: data,
                    style: [
                        {
                            selector: 'node',
                            style: {
                                'label': 'data(label)',
                                'color': '#f8fafc',
                                'text-valign': 'bottom',
                                'text-margin-y': 8,
                                'font-size': '11px',
                                'text-wrap': 'wrap',
                                'text-max-width': '95px',
                                'width': 52,
                                'height': 52,
                                'background-image': function(node) {
                                    if (node.data('id') === 'ungoogled') return 'none';
                                    return getLogoUrl(node.data());
                                },
                                'background-fit': 'contain',
                                'background-clip': 'node',
                                'background-opacity': 0,
                                'border-width': 2.5,
                                'border-color': function(node) { return nodeColors[node.data('id')] || '#94a3b8'; },
                                'border-opacity': 0.65,
                                'shape': 'ellipse',
                            }
                        },
                        {
                            selector: 'edge',
                            style: {
                                'width': 1.5,
                                'line-color': '#334155',
                                'target-arrow-color': '#334155',
                                'target-arrow-shape': 'triangle',
                                'curve-style': 'bezier',
                                'opacity': 0.7
                            }
                        },
                        {
                            selector: 'node.highlighted',
                            style: {
                                'opacity': 1,
                                'text-opacity': 1,
                                'border-width': 4,
                                'shadow-blur': 16,
                                'shadow-opacity': 0.35,
                                'shadow-color': function(node) { return nodeColors[node.data('id')] || '#38bdf8'; }
                            }
                        },
                        {
                            selector: 'node.dimmed',
                            style: {
                                'opacity': 0.16,
                                'text-opacity': 0.18,
                                'border-opacity': 0.14
                            }
                        },
                        {
                            selector: 'edge.highlighted',
                            style: {
                                'opacity': 0.82,
                                'width': 2.2
                            }
                        },
                        {
                            selector: 'edge.dimmed',
                            style: {
                                'opacity': 0.08
                            }
                        },
                        {
                            selector: 'node[id = "ungoogled"]',
                            style: {
                                'background-image': 'none',
                                'background-opacity': 0
                            }
                        },
                        {
                            selector: 'node:selected',
                            style: {
                                'border-width': 3.5,
                                'border-opacity': 1,
                                'border-color': function(node) { return nodeColors[node.data('id')] || '#38bdf8'; },
                                'background-opacity': 0.15,
                                'background-color': function(node) { return nodeColors[node.data('id')] || '#38bdf8'; },
                            }
                        },
                        {
                            selector: 'node:active',
                            style: { 'overlay-opacity': 0 }
                        }
                    ],
                    layout: getLayoutOptions(profile),
                    userZoomingEnabled: true,
                    wheelSensitivity: 0.1,
                    minZoom: 0.1,
                    maxZoom: 3
                });

                function applyResponsiveGraphStyles(profileName) {
                    const isMobile = profileName === 'mobile';
                    cy.style()
                        .selector('node')
                        .style('width', isMobile ? 48 : 52)
                        .style('height', isMobile ? 48 : 52)
                        .style('font-size', isMobile ? '10px' : '11px')
                        .style('text-max-width', isMobile ? '90px' : '95px')
                        .selector('edge')
                        .style('width', isMobile ? 1.4 : 1.5)
                        .update();
                }

                function applyThemeToGraph(theme) {
                    const isLight = theme === 'light';
                    const nodeTextColor = isLight ? '#0f172a' : '#f8fafc';
                    const edgeColor = isLight ? '#94a3b8' : (theme === 'dark-oled' ? '#27272a' : '#334155');
                    cy.style()
                        .selector('node')
                        .style('color', nodeTextColor)
                        .selector('edge')
                        .style('line-color', edgeColor)
                        .style('target-arrow-color', edgeColor)
                        .update();
                }

                function applyLegendFilter(group) {
                    if (activeLegendGroup === group) {
                        activeLegendGroup = null;
                        setLegendActive(null);
                        cy.batch(() => {
                            cy.nodes().removeClass('dimmed highlighted');
                            cy.edges().removeClass('dimmed highlighted');
                        });
                        return;
                    }

                    activeLegendGroup = group;
                    setLegendActive(group);
                    const matchingNodes = cy.nodes().filter((node) => getLegendGroup(node.id()) === group);

                    cy.batch(() => {
                        cy.nodes().removeClass('dimmed highlighted');
                        cy.edges().removeClass('dimmed highlighted');
                        cy.nodes().not(matchingNodes).addClass('dimmed');
                        matchingNodes.addClass('highlighted');
                        cy.edges().forEach((edge) => {
                            const sourceMatch = getLegendGroup(edge.source().id()) === group;
                            const targetMatch = getLegendGroup(edge.target().id()) === group;
                            if (sourceMatch || targetMatch) {
                                edge.addClass('highlighted');
                            } else {
                                edge.addClass('dimmed');
                            }
                        });
                    });
                }

                function runResponsiveLayout() {
                    const nextProfile = applyViewportProfile();
                    applyResponsiveGraphStyles(nextProfile);
                    const layout = cy.layout(getLayoutOptions(nextProfile));
                    layout.run();
                    setTimeout(() => adjustSpecialPositions(cy, nextProfile), 120);
                }

                document.querySelectorAll('.legend-item').forEach((item) => {
                    item.addEventListener('click', () => applyLegendFilter(item.dataset.group));
                });

                let resizeTimer = null;
                window.addEventListener('resize', () => {
                    window.clearTimeout(resizeTimer);
                    resizeTimer = window.setTimeout(() => runResponsiveLayout(), 160);
                });

                applyResponsiveGraphStyles(profile);
                setTimeout(() => adjustSpecialPositions(cy, profile), 120);

                cy.on('tap', 'node', async function(evt) {
                    const node = evt.target;
                    const nd = node.data();
                    const color = nodeColors[nd.id] || '#94a3b8';
                    const engine = engineLabels[nd.id] || '';
                    const engineStyle = engineColors[engine] || { bg: '#1e293b', text: '#94a3b8' };

                    document.getElementById('placeholder').style.display = 'none';
                    localStorage.setItem('mapHintDismissed', '1');
                    const sidebar = document.getElementById('sidebar');
                    sidebar.style.display = 'flex';
                    sidebar.classList.remove('sidebar-open');
                    sidebar.classList.remove('sidebar-closing');
                    void sidebar.offsetWidth;
                    sidebar.classList.add('sidebar-open');
                    document.body.classList.add('sidebar-visible');

                    // Logo
                    const logoEl = document.getElementById('sidebar-logo');
                    logoEl.style.display = 'block';
                    logoEl.onerror = function () {
                        this.onerror = null;
                        this.src = `https://www.google.com/s2/favicons?sz=256&domain_url=${nd.url}`;
                    };
                    logoEl.src = getLogoUrl(nd, 256);
                    logoEl.alt = nd.label;

                    // Title & badge
                    document.getElementById('title').innerText = nd.label;
                    document.getElementById('title').style.color = color;
                    const badge = document.getElementById('engine-badge');
                    if (engine) {
                        badge.innerText = engine;
                        badge.style.background = engineStyle.bg;
                        badge.style.color = engineStyle.text;
                        badge.style.display = 'inline-block';
                    } else {
                        badge.style.display = 'none';
                    }

                    document.getElementById('content').innerHTML = '<span style="color:#64748b">Loading from Wikipedia...</span>';

                    if (nd.noWiki) {
                        // No wiki — show custom description and link to homepage
                        const extract = nd.wikiNote || 'No description available.';
                        const metaHtml = buildMetaHtml(nd);
                        document.getElementById('content').innerHTML = `
                            <p>${extract}</p>
                            ${metaHtml}
                            <hr>
                            <a href="${nd.wikiUrl || ('https://en.wikipedia.org/wiki/' + (nd.wiki || ''))}" target="_blank">Read more on Wikipedia →</a><br>
                            <a href="${nd.url}" target="_blank">Visit official page →</a>
                        `;
                        return;
                    }

                    const wikiUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${nd.wiki}`;
                    try {
                        const res = await fetch(wikiUrl);
                        const info = await res.json();
                        const extract = info.extract || 'No description available.';
                        const wikiLink = info.content_urls?.desktop?.page || `https://en.wikipedia.org/wiki/${nd.wiki}`;
                        const metaHtml = buildMetaHtml(nd);
                        document.getElementById('content').innerHTML = `
                            <p>${extract}</p>
                            ${metaHtml}
                            <hr>
                            <a href="${wikiLink}" target="_blank">Read more on Wikipedia →</a><br>
                            <a href="${nd.url}" target="_blank">Visit official page →</a>
                        `;
                    } catch (e) {
                        document.getElementById('content').innerText = 'Failed to load Wikipedia data.';
                    }
                });

                cy.on('tap', function(evt) {
                    if (evt.target === cy) closeSidebar();
                });

                const activeTheme = document.body.classList.contains('theme-light') ? 'light' : (document.body.classList.contains('theme-dark-oled') ? 'dark-oled' : 'dark-standard');
                applyThemeToGraph(activeTheme);

                window.applyThemeToGraph = applyThemeToGraph;
                window.runResponsiveLayout = runResponsiveLayout;

            } catch (error) {
                console.error('Error loading data.json:', error);
                document.getElementById('placeholder').innerText = 'Error loading map data.';
            }
        }

        init();

        function changeTheme(theme) {
            const body = document.body;
            body.classList.remove('dark-mode', 'light-mode', 'theme-dark-standard', 'theme-dark-oled', 'theme-light');

            if (theme === 'light') {
                body.classList.add('theme-light');
                localStorage.setItem('theme', 'light');
                localStorage.setItem('themePreference', 'light');
                if (window.applyThemeToGraph) window.applyThemeToGraph('light');
                return;
            }

            if (theme === 'dark-oled') {
                body.classList.add('theme-dark-oled');
                localStorage.setItem('theme', 'dark');
                localStorage.setItem('themePreference', 'dark-oled');
                if (window.applyThemeToGraph) window.applyThemeToGraph('dark-oled');
                return;
            }

            body.classList.add('theme-dark-standard');
            localStorage.setItem('theme', 'dark');
            localStorage.setItem('themePreference', 'dark-standard');
            if (window.applyThemeToGraph) window.applyThemeToGraph('dark-standard');
        }

        // Load theme preference
        window.addEventListener('DOMContentLoaded', function() {
            const select = document.getElementById('theme-select');
            const legacyTheme = localStorage.getItem('theme');
            const storedTheme = localStorage.getItem('themePreference') || (legacyTheme === 'light' ? 'light' : 'dark-standard');
            select.value = storedTheme;
            changeTheme(storedTheme);
        });
    </script>
</body>
</html>
